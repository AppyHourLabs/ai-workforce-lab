name: Phase B Promotion Tracker

on:
  schedule:
    # Daily at 15:00 UTC (11:00 ET) — after all morning agents complete
    - cron: '0 15 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  track-gates:
    name: Compute Phase B Gate Metrics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure log file exists
        run: |
          mkdir -p LOGS/checksums
          touch LOGS/agent-runs.jsonl

      - name: Compute gate metrics
        run: bash scripts/phase-b-gates.sh > /tmp/gates.json

      - name: Display metrics
        run: cat /tmp/gates.json

      - name: Generate dashboard
        run: bash scripts/generate-dashboard.sh /tmp/gates.json

      - name: Run checksum
        run: bash scripts/checksum-logs.sh

      - name: Create or update PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update Phase B dashboard ${{ github.run_id }} [skip ci]"
          title: "chore: Phase B dashboard update"
          body: "Auto-generated by the Phase B Promotion Tracker workflow."
          branch: auto/phase-b-dashboard
          delete-branch: true
          labels: auto-generated

