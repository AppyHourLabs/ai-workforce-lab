name: Phase B Promotion Tracker

on:
  schedule:
    # Daily at 15:00 UTC (11:00 ET) — after all morning agents complete
    - cron: '0 15 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  track-gates:
    name: Compute Phase B Gate Metrics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure log file exists
        run: |
          mkdir -p LOGS/checksums
          touch LOGS/agent-runs.jsonl

      - name: Compute gate metrics
        run: bash scripts/phase-b-gates.sh > /tmp/gates.json

      - name: Display metrics
        run: cat /tmp/gates.json

      - name: Generate dashboard
        run: bash scripts/generate-dashboard.sh /tmp/gates.json

      - name: Run checksum
        run: bash scripts/checksum-logs.sh

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/phase-b-dashboard"
          git config user.name "Phase B Tracker"
          git config user.email "ai@appyhourlabs.com"

          # Check if there are any changes to commit
          git add LOGS/phase-b-dashboard.md LOGS/checksums/ LOGS/agent-runs.jsonl
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git reset HEAD  # unstage for now

          # Create or reset the PR branch from current main
          git checkout -B "$BRANCH"

          # Stage and commit
          git add LOGS/phase-b-dashboard.md LOGS/checksums/ LOGS/agent-runs.jsonl
          git commit -m "chore: update Phase B dashboard $(date -u +%Y-%m-%d) [skip ci]"
          git push --force origin "$BRANCH"

          # Create PR if one doesn't already exist
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "chore: Phase B dashboard update" \
              --body "Auto-generated by the Phase B Promotion Tracker workflow." \
              --head "$BRANCH" \
              --base main || true
          fi

